name: CI

on:
  push:
    branches: [main, 1105, complete-snapshot-2026-05-11]
  pull_request:
    branches: [main]

jobs:
  client-build:
    name: Client (Vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client

  server-smoke:
    name: Server (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: node --test test/smoke.test.js
        working-directory: server
        env:
          JWT_SECRET: ci-only-jwt-secret-do-not-use-in-prod
          NODE_ENV: test
          PORT: 0
          RACKTRACK_SKIP_WORKER_POOL: 1

  pipeline-import:
    name: Pipeline (import check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - run: pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Import pipeline modules
        run: |
          python -c "import importlib, sys; \
            mods = ['pipeline.config_loader', 'pipeline.quality_check', 'pipeline.device_db', \
                    'pipeline.firmware_check', 'pipeline.all_vendor']; \
            [importlib.import_module(m) for m in mods]; \
            print('imports ok')"

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
